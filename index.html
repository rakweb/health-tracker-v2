<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <meta name="theme-color" content="#0b1220">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Cpath d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <!-- PWA manifest -->
  <link rel="manifest" href="data:application/manifest+json,{
    \"name\":\"Health Tracker\",
    \"short_name\":\"HealthTrack\",
    \"start_url\":\"./\",
    \"display\":\"standalone\",
    \"background_color\":\"#0b1220\",
    \"theme_color\":\"#0b1220\",
    \"icons\":[{\"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Cpath d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\",\"sizes\":\"192x192\",\"type\":\"image/svg+xml\"}]
  }">

  <!-- Libraries -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2a;
      --muted: #8aa0c3;
      --text: #e6eefc;
      --accent: #4ba3ff;
      --danger: #ff5c5c;
      --warn: #ffcc66;
      --ok: #27d79b;
      --ring: #2a3a58;
      --chip: #1a2440;
      --btn: #1a2842;
      --btn-hover: #223152;
      --card: #0e1628;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11, 18, 32, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--ring);
      padding: 12px 16px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    h1 { font-size: 1.8rem; margin: 0.5rem 0; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: var(--panel);
      padding: 12px;
      border-radius: 10px;
      margin: 16px 0;
    }
    button, input, select, textarea {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a3a58;
      background: #0c1426;
      color: white;
    }
    button { cursor: pointer; }
    button.ok { background: #113c2d; border-color: #2f8f73; }
    button.danger { background: #3a1216; border-color: #8e2b37; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-backdrop.show { display: flex; opacity: 1; }
    .modal {
      background: var(--card);
      border: 1px solid var(--ring);
      border-radius: 10px;
      width: 92%;
      max-width: 860px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 16px;
      transform: scale(0.92);
      opacity: 0;
      transition: all 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-backdrop.show .modal { transform: scale(1); opacity: 1; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 9px; border-radius: 6px; border: 1px solid #2a3a58; background: #0c1426; color: white; }
    .field-full { grid-column: 1 / -1; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip {
      background: #1a2440;
      border: 1px solid #2a3a58;
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chip button { background: none; border: none; color: #ff5c5c; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; background: var(--panel); border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #1f2a45; }
    th { background: #0a1426; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Health Tracker</h1>
    <div class="sub">Track vitals, symptoms & notes</div>
    <button id="btnInstall" style="display:none; margin-top:8px;">Install App</button>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <button id="btnAdd" class="ok">+ Add Entry</button>
    <button id="btnRefresh">Refresh</button>
    <button id="btnExportCSV">Export CSV</button>
    <button id="btnExportPDF">Export PDF</button>
    <button id="btnImportCSV">Import CSV</button>
    <input type="file" id="fileImport" accept=".csv" style="display:none">
    <button id="btnFields">Select Fields</button>
    <button id="btnThresholds">Thresholds</button>
    <button id="btnOptions">Options</button>
  </div>

  <div id="riskChips" class="chips" style="margin:16px 0;"></div>

  <div style="height:320px; margin:20px 0; background:var(--panel); border-radius:10px; padding:12px;">
    <canvas id="healthChart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th><th>Time</th><th>Glucose</th><th>BP</th><th>SpO₂</th><th>HR</th><th>Weight</th><th>BMI</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</main>

<!-- Entry Modal -->
<div class="modal-backdrop" id="entryModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Entry</h2>
      <button type="button" class="close-modal">×</button>
    </div>

    <div class="row">
      <div><label>Date *</label><input type="date" id="f_date" required></div>
      <div><label>Time</label><input type="time" id="f_time"></div>
      <div><label>Glucose (mg/dL)</label><input type="number" id="f_glucose" step="any"></div>
      <div><label>Systolic (mmHg)</label><input type="number" id="f_sys"></div>
      <div><label>Diastolic (mmHg)</label><input type="number" id="f_dia"></div>
      <div><label>SpO₂ (%)</label><input type="number" id="f_spo2" min="0" max="100" step="0.1"></div>
      <div><label>Heart Rate (bpm)</label><input type="number" id="f_hr"></div>
      <div><label>Weight (lbs)</label><input type="number" id="f_weightLbs" step="0.1" oninput="calcBMI()"></div>
      <div><label>Height (in)</label><input type="number" id="f_heightIn" step="0.1" oninput="calcBMI()"></div>
      <div><label>Waist (in)</label><input type="number" id="f_waistIn" step="0.1"></div>
      <div><label>BMI</label><input type="text" id="f_bmi" readonly></div>
      <div><label>Temp (°F)</label><input type="number" id="f_tempF" step="0.1"></div>
      <div><label>Lung Fluid (cc)</label><input type="number" id="f_lungFluidCc"></div>
      <div><label>Respiration</label><input type="number" id="f_resp"></div>
      <div><label>Sleep (hrs)</label><input type="number" id="f_sleep" step="0.1"></div>
      <div><label>Steps</label><input type="number" id="f_steps"></div>
      <div><label>Stress (0-100)</label><input type="number" id="f_stress" min="0" max="100"></div>
      <div><label>Body Battery</label><input type="number" id="f_bodyBattery" min="0" max="100"></div>

      <div>
        <label>Pain (0-10)</label>
        <input type="range" id="f_pain" min="0" max="10" value="0" step="1" oninput="const v=document.getElementById('painVal');if(v)v.textContent=this.value">
        <div>Level: <strong id="painVal">0</strong></div>
      </div>

      <div><label>Emotions</label><select id="f_emotions">
        <option value="">— None —</option>
        <option>Happy</option><option>Calm</option><option>Neutral</option>
        <option>Anxious</option><option>Stressed</option><option>Sad</option><option>Fatigued</option>
      </select></div>

      <div class="field-full">
        <label>Medicines</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <input id="medName" placeholder="Name" style="flex:2;">
          <input id="medDose" placeholder="Dose" style="flex:1;">
          <input id="medUnit" placeholder="Unit" style="flex:1;">
          <button type="button" id="btnAddMed">+ Add</button>
        </div>
        <div id="medList" class="chips"></div>
      </div>

      <div class="field-full">
        <label>Comments</label>
        <textarea id="f_comments" rows="4" placeholder="Notes..."></textarea>
      </div>
    </div>

    <div style="margin-top:24px; text-align:right;">
      <button class="danger" id="btnDeleteEntry" style="display:none; margin-right:12px;">Delete</button>
      <button class="ok" id="btnSaveEntry">Save Entry</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Database
// ─────────────────────────────────────────────

let db;
const DB_NAME = 'healthTracker';
const STORE = 'entries';

async function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, {keyPath:'id', autoIncrement:true});
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = e => rej(e.target.error);
  });
}

async function saveEntry(entry) {
  if (!db) await initDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    const { id, ...clean } = entry;
    const req = id != null && Number.isInteger(id) ? store.put({ ...clean, id }) : store.add(clean);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

async function getAllEntries() {
  if (!db) await initDB();
  return new Promise(r => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => r(req.result || []);
  });
}

async function deleteEntry(id) {
  if (!db) await initDB();
  return new Promise(r => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id).onsuccess = () => r();
  });
}

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────

let editId = null;
let meds = [];

// Real-time BMI
function calcBMI() {
  const w = parseFloat(document.getElementById('f_weightLbs')?.value) || 0;
  const h = parseFloat(document.getElementById('f_heightIn')?.value) || 0;
  const bmi = (w && h) ? (703 * w / (h * h)).toFixed(1) : '';
  const bmiEl = document.getElementById('f_bmi');
  if (bmiEl) bmiEl.value = bmi;
}

// Render table
async function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const entries = await getAllEntries();
  entries.sort((a,b) => (b.id||0) - (a.id||0));

  entries.forEach(e => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${e.date||'—'}</td>
      <td>${e.time||'—'}</td>
      <td>${e.glucose??'—'}</td>
      <td>${e.sys&&e.dia ? e.sys+'/'+e.dia : '—'}</td>
      <td>${e.spo2??'—'}</td>
      <td>${e.hr??'—'}</td>
      <td>${e.weightLbs??'—'}</td>
      <td>${e.bmi??'—'}</td>
      <td><button class="edit">Edit</button> <button class="delete">Delete</button></td>
    `;
    tr.querySelector('.edit').onclick = () => openEntry(e.id, e);
    tr.querySelector('.delete').onclick = async () => {
      if (confirm('Delete?')) { await deleteEntry(e.id); renderTable(); }
    };
    tbody.appendChild(tr);
  });
}

// Open modal
function openEntry(id = null, data = {}) {
  editId = id;
  meds = data.meds ? [...data.meds] : [];

  document.getElementById('modalTitle').textContent = id ? 'Edit Entry' : 'Add Entry';
  document.getElementById('btnDeleteEntry').style.display = id ? '' : 'none';

  const fields = ['date','time','glucose','sys','dia','spo2','hr','weightLbs','heightIn','waistIn','tempF','lungFluidCc','resp','sleep','steps','stress','bodyBattery','pain','emotions','comments'];
  fields.forEach(f => {
    const el = document.getElementById('f_' + f);
    if (el) el.value = data[f] ?? '';
  });

  document.getElementById('f_pain').value = data.pain ?? 0;
  document.getElementById('painVal').textContent = data.pain ?? 0;
  calcBMI();

  renderMeds();
  document.getElementById('entryModal').classList.add('show');
}

function renderMeds() {
  const container = document.getElementById('medList');
  if (!container) return;
  container.innerHTML = '';
  meds.forEach((m,i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${m.name} ${m.dose||''}${m.unit?' '+m.unit:''} <button>×</button>`;
    chip.lastChild.onclick = () => { meds.splice(i,1); renderMeds(); };
    container.appendChild(chip);
  });
}

function closeModal() {
  const backdrop = document.getElementById('entryModal');
  if (!backdrop) return;
  const modal = backdrop.querySelector('.modal');
  if (modal) {
    modal.style.transform = 'scale(0.85)';
    modal.style.opacity = '0';
  }
  setTimeout(() => {
    backdrop.classList.remove('show');
    if (modal) {
      modal.style.transform = '';
      modal.style.opacity = '';
    }
  }, 350);
}

// Save
document.getElementById('btnSaveEntry').addEventListener('click', async e => {
  e.preventDefault();
  e.stopPropagation();

  const entry = {
    date: document.getElementById('f_date').value,
    time: document.getElementById('f_time').value || null,
    glucose: Number(document.getElementById('f_glucose').value) || null,
    sys: Number(document.getElementById('f_sys').value) || null,
    dia: Number(document.getElementById('f_dia').value) || null,
    spo2: Number(document.getElementById('f_spo2').value) || null,
    hr: Number(document.getElementById('f_hr').value) || null,
    weightLbs: Number(document.getElementById('f_weightLbs').value) || null,
    heightIn: Number(document.getElementById('f_heightIn').value) || null,
    waistIn: Number(document.getElementById('f_waistIn').value) || null,
    tempF: Number(document.getElementById('f_tempF').value) || null,
    lungFluidCc: Number(document.getElementById('f_lungFluidCc').value) || null,
    resp: Number(document.getElementById('f_resp').value) || null,
    sleep: Number(document.getElementById('f_sleep').value) || null,
    steps: Number(document.getElementById('f_steps').value) || null,
    stress: Number(document.getElementById('f_stress').value) || null,
    bodyBattery: Number(document.getElementById('f_bodyBattery').value) || null,
    pain: Number(document.getElementById('f_pain').value) || 0,
    emotions: document.getElementById('f_emotions').value || '',
    comments: document.getElementById('f_comments').value || '',
    meds: [...meds]
  };

  if (!entry.date) {
    alert('Date is required');
    return;
  }

  if (editId !== null && Number.isInteger(editId)) entry.id = editId;

  try {
    await saveEntry(entry);
    closeModal();
    renderTable();
    alert('Entry saved successfully');
  } catch (err) {
    console.error('Save failed:', err);
    alert('Failed to save entry: ' + err.message);
  }
});

// Other buttons
document.getElementById('btnAdd').addEventListener('click', () => openEntry());
document.getElementById('btnRefresh').addEventListener('click', renderTable);
document.getElementById('btnExportCSV').addEventListener('click', async () => {
  const entries = await getAllEntries();
  if (!entries.length) return alert('No data to export');

  let csv = 'date,time,glucose,sys,dia,spo2,hr,weightLbs,heightIn,waistIn,bmi,tempF,lungFluidCc,resp,sleep,steps,stress,bodyBattery,pain,emotions,comments,meds\n';
  entries.forEach(e => {
    const medsStr = (e.meds||[]).map(m => `${m.name} ${m.dose||''}${m.unit?' '+m.unit:''}`).join('; ');
    csv += `${e.date||''},${e.time||''},${e.glucose??''},${e.sys??''},${e.dia??''},${e.spo2??''},${e.hr??''},${e.weightLbs??''},${e.heightIn??''},${e.waistIn??''},${e.bmi??''},${e.tempF??''},${e.lungFluidCc??''},${e.resp??''},${e.sleep??''},${e.steps??''},${e.stress??''},${e.bodyBattery??''},${e.pain??''},"${(e.emotions||'').replace(/"/g,'""')}","${(e.comments||'').replace(/"/g,'""')}","${medsStr.replace(/"/g,'""')}"\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'health-tracker.csv';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btnAddMed').addEventListener('click', () => {
  const name = document.getElementById('medName').value.trim();
  if (!name) return;
  meds.push({name, dose:document.getElementById('medDose').value.trim()||null, unit:document.getElementById('medUnit').value.trim()||null});
  document.getElementById('medName').value = '';
  document.getElementById('medDose').value = '';
  document.getElementById('medUnit').value = '';
  renderMeds();
});

document.getElementById('entryModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.querySelector('#entryModal .close-modal')?.addEventListener('click', closeModal);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Start
(async () => {
  await initDB();
  renderTable();
})();
</script>
</body>
</html>
